[gcode_macro M600]
gcode:
    {% set B = (params.B|default(2)|int,0)|max %}
    {% set E = (params.E|default(1)|float,0.0)|max %}
    {% set U = (params.U|default(50)|float,0.0)|max %}
    {% set Z = (params.Z|default(30)|float,0.0)|max %}
    SAVE_GCODE_STATE NAME=M600_state
    PAUSE
    G91
    G1 E-50 F2700
    G1 Z{Z}
    G90
    G1 X10 Y230 F3000
    G91
    G1 E-{U} F900
    {% for n in range(B) %}
        M300 P1000 S1000
        G4 P1000
    {% endfor %}
    G91
    G1 E{U} F600
    G1 E5 F300
    G90
    G1 X10 Y230 F3000
    G1 E10 F300
    G1 E-3 F300
    RESTORE_GCODE_STATE NAME=M600_state MOVE=0

[gcode_macro UNLOAD_FILAMENT]
gcode:
    M83
    M109 S240
    G1 E10 F300
    G1 E-50 F1800
    G1 E-50 F1800
    G1 E-50 F1800
    G1 E-50 F1800
    G1 E-50 F1800
    G1 E-50 F1800
    G1 E-50 F1800
    G1 E-50 F1800
    G1 E-50 F1800
    G1 E-50 F1800
    G1 E-50 F1800
    G1 E-50 F1800
    G1 E-50 F1800
    M82

[gcode_macro LOAD_FILAMENT]
gcode:
    M83
    M109 S220
    G1 E50 F1800
    G1 E50 F1800
    G1 E50 F1800
    G1 E50 F1800
    G1 E50 F1800
    G1 E50 F1800
    G1 E15 F150
    G1 E15 F150
    G1 E15 F150
    M82

[gcode_macro START_PRINT]
gcode:
    G92 E0
    G28
    BED_MESH_PROFILE LOAD=default
    G1 Z2.0 F3000
    G1 X0.1 Y20 Z0.3 F5000.0
    G1 X0.1 Y200.0 Z0.3 F1500.0 E15
    G1 X0.4 Y200.0 Z0.3 F5000.0  
    G1 X0.4 Y20 Z0.3 F1500.0 E30
    G92 E0
    G1 Z2.0 F3000
    G1 X5 Y20 Z0.3 F5000.0
    